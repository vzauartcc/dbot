# doppler-template.yaml
projects:
  - name: 'dbot' # Name may contain lowercase letters, spaces, numbers, hyphens, and underscores
    description: 'Discord bot for vZAU'

    # List of totally customizable environments, e.g Test, Stage, QA, CI-CD
    environments:
      - name: 'Development' # Name may contain letters, spaces, numbers, hyphens, and underscores
        slug: 'dev' # Slug may contain letters, numbers, hyphens, and underscores
        configs:
          - slug: 'dev' # First slug *must* match environment slug name
          - slug: 'dev_personal'

      - name: 'Staging'
        slug: 'stg'
        configs:
          - slug: 'stg'

      - name: 'Production'
        slug: 'prd'
        configs:
          - slug: 'prd'

    # Define secrets for each environment
    secrets:
      dev:
        DISCORD_SERVER_ID: ''
        DISCORD_TOKEN: ''
        ZAU_API_KEY: ''
        ZAU_API_URL: ''
        REDIS_URI: ''

      stg:
        DISCORD_SERVER_ID: ''
        DISCORD_TOKEN: ''
        ZAU_API_KEY: ''
        ZAU_API_URL: ''
        REDIS_URI: ''

      prd:
        DISCORD_SERVER_ID: ''
        DISCORD_TOKEN: ''
        ZAU_API_KEY: ''
        ZAU_API_URL: ''
        REDIS_URI: ''
